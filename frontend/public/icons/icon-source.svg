<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep blue-to-teal gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e40af"/>
      <stop offset="50%"  stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  <!-- Inner highlight overlay -->
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- Wind streams (white, representing clean air / purification) -->

  <!-- Top large arc -->
  <path d="M 108 210
           C 130 170, 190 148, 248 162
           C 300 174, 330 208, 324 244
           C 318 278, 284 296, 248 296
           L 108 296"
        fill="none"
        stroke="white"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Bottom curl arc -->
  <path d="M 108 296
           L 248 296
           C 300 296, 340 316, 348 352
           C 356 386, 330 416, 292 420
           C 260 424, 236 404, 228 380"
        fill="none"
        stroke="white"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Small top-right arc -->
  <path d="M 324 196
           C 348 168, 390 158, 416 176
           C 438 192, 436 224, 412 240
           C 396 252, 372 250, 356 244"
        fill="none"
        stroke="white"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.75"/>

  <!-- CO2 / air particles dots (decorative) -->
  <circle cx="148" cy="380" r="12" fill="white" opacity="0.4"/>
  <circle cx="184" cy="400" r="8"  fill="white" opacity="0.3"/>
  <circle cx="168" cy="420" r="6"  fill="white" opacity="0.2"/>
</svg>
